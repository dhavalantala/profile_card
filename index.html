<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <title>Proofile Card UI Design</title>
</head>
<body>
    <div class="profile-card">
        <div class="image">
            <img src="image/photo.png" alt="" class="profile-img">
        </div>
        <div class="text-data">
            <span class="name">Dhaval Antala</span>
            <span class="job">Software Engineer</span>
        </div>
        <div class="media-buttons">
            <a href="#" class="link" style="background-color: #FFB800;">
                <i class='bx bx-code-alt' ></i>
            </a>
            <a href="#" class="link" style="background-color: #25292E;">
                <i class='bx bxl-github' ></i>
            </a>
            <a href="#" class="link" style="background-color: rgb(10, 102, 194);">
                <i class='bx bxl-linkedin' ></i>
            </a>
            <a href="#" class="link" style="background-color: #e1306c;">
                <i class='bx bxl-instagram-alt'></i>
            </a>
        </div>
        <div class="buttons">
            <button class="button">Contact</button>
            <button class="button">Email</button>
        </div>
        <div class="analytics">
            <div class="data">
                <i class='bx bx-heart' ></i>
                <span class="number">
                    60K
                </span>
            </div>
            <div class="data">
                <i class='bx bx-message-rounded'></i>
                <span class="number">
                    20K
                </span>
            </div>
            <div class="data"></div>
                <i class='bx bx-share-alt' ></i>
                <span class="number">
                    12K
                </span>
            </div>
        </div>
    </div>
</body>
</html>
